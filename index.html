<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.jpg">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a1a'/%3E%3Ccircle cx='16' cy='16' r='13' fill='%239c9a92'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(0,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(30,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(60,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(90,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(120,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(150,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(180,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(210,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(240,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(270,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(300,16,16)'/%3E%3Cline x1='16' y1='3' x2='16' y2='6.5' stroke='%234a4a4a' stroke-width='1.5' transform='rotate(330,16,16)'/%3E%3Ccircle cx='16' cy='16' r='10' fill='%23252525' stroke='%233a3a3a' stroke-width='0.5'/%3E%3Cline x1='16' y1='7' x2='16' y2='11.5' stroke='%23c9a227' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%23555'/%3E%3C/svg%3E">
<title>Left of the Dial</title>
<style>
  :root {
    --bg: #111111;
    --bg2: #1a1a1a;
    --bg3: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --amber: #c9a227;
    --amber-dim: rgba(201,162,39,0.15);
    --amber-border: rgba(201,162,39,0.38);
    --text: #cecece;
    --text-dim: #666666;
    --text-faint: #3a3a3a;
    --red: #f87171;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', sans-serif; overscroll-behavior: none; }

  /* ── Header ── */
  #header {
    position: sticky; top: 0; z-index: 50;
    overflow: hidden;
    /* Silver faceplate only — wood applied via ::before */
    background:
      repeating-linear-gradient(180deg,
        transparent 0, transparent 2px,
        rgba(255,255,255,0.04) 2px, rgba(255,255,255,0.04) 3px
      ),
      linear-gradient(180deg,
        #c8c6be 0%, #dcdad2 8%, #e8e6de 35%,
        #e2e0d8 65%, #d4d2ca 85%, #c2c0b8 100%
      );
    border-bottom: 2px solid #787870;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    padding: calc(55px + env(safe-area-inset-top, 0px)) calc(16px + env(safe-area-inset-right, 0px)) 12px calc(16px + env(safe-area-inset-left, 0px));
  }
  /* Wood cabinet top panel */
  #header::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: calc(40px + env(safe-area-inset-top, 0px));
    background:
      repeating-linear-gradient(90deg,
        transparent 0px, transparent 38px,
        rgba(0,0,0,0.07) 38px, rgba(0,0,0,0.07) 39px
      ),
      repeating-linear-gradient(180deg,
        transparent 0px, transparent 5px,
        rgba(255,255,255,0.012) 5px, rgba(255,255,255,0.012) 6px
      ),
      linear-gradient(90deg,
        #2c1a0c 0%, #4a2c16 14%, #3a2210 30%,
        #56321e 50%, #3e2614 68%, #4a2c16 82%, #2c1a0c 100%
      );
    pointer-events: none;
  }
  /* Console edge — thick black lip between wood and faceplate */
  #header::after {
    content: ''; position: absolute;
    top: calc(40px + env(safe-area-inset-top, 0px));
    left: 0; right: 0; height: 3px;
    background: linear-gradient(180deg, #0d0806 0%, #060402 55%, #1a120a 100%);
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  #wordmark {
    display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px;
  }
  #wordmark-title-row {
    display: flex; align-items: center; gap: 9px;
  }
  #dial {
    flex-shrink: 0;
  }
  #wordmark-title {
    font-family: monospace; font-size: 18px; font-weight: 700;
    color: #8a6410; letter-spacing: 4px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 -1px 0 rgba(0,0,0,0.15);
  }
  #wordmark-sub {
    color: #666; font-family: monospace; font-size: 10px; letter-spacing: 2px;
    padding-left: 2px;
  }
  #search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  #search-input {
    flex: 1; background: #f2f0e8; border: 1px solid #b0aea6;
    border-radius: 3px; padding: 9px 12px; color: #111; font-size: 16px;
    outline: none; font-family: inherit;
    transition: border-color 0.2s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
  }
  #search-input:focus { border-color: #8a6410; }
  #search-input::placeholder { color: #999; }
  #tabs { display: flex; gap: 5px; margin-bottom: 8px; }
  .tab-btn {
    background: transparent; border: 1px solid transparent;
    border-radius: 5px; padding: 5px 12px; cursor: pointer;
    font-family: monospace; font-size: 11px; letter-spacing: 1px;
    color: #555; text-transform: uppercase; transition: all 0.15s;
  }
  .tab-btn.active {
    background: rgba(138,100,16,0.12); border-color: rgba(138,100,16,0.35); color: #7a5c0c;
  }
  #filter-row {
    display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px;
  }
  .filter-chip {
    background: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.2);
    border-radius: 20px; padding: 3px 10px; cursor: pointer;
    font-size: 11px; color: #555; transition: all 0.15s;
  }
  .filter-chip.active {
    background: rgba(138,100,16,0.15); border-color: rgba(138,100,16,0.45); color: #7a5c0c;
  }

  /* ── Content ── */
  #content { background: #111; padding: 12px 16px 0; max-width: 700px; margin: 0 auto; }

  /* ── Import row (Saved tab) ── */
  #import-row { display: none; gap: 8px; margin-bottom: 12px; }
  #import-input {
    flex: 1; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 11px; color: var(--text); font-size: 16px;
    outline: none; font-family: inherit; transition: border-color 0.2s;
  }
  #import-input:focus { border-color: var(--amber-border); }
  #import-input::placeholder { color: var(--text-dim); font-size: 13px; }
  #import-btn {
    background: var(--amber-dim); border: 1px solid var(--amber-border);
    border-radius: 4px; padding: 8px 14px; color: var(--amber);
    font-family: monospace; font-size: 12px; letter-spacing: 1px; cursor: pointer; flex-shrink: 0;
  }
  #status-msg {
    padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px;
    display: none;
  }
  #status-msg.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
  #status-msg.info { background: rgba(201,162,39,0.08); border: 1px solid rgba(201,162,39,0.2); color: var(--amber); }

  #loading {
    display: none; justify-content: center; align-items: flex-end;
    gap: 3px; padding: 48px 0; height: 80px;
  }
  .load-bar {
    width: 3px; background: var(--amber); border-radius: 2px; opacity: 0.6;
    animation: vuload 0.5s ease-in-out infinite alternate;
  }
  @keyframes vuload { from { transform: scaleY(0.2); } to { transform: scaleY(1); } }

  #empty { display: none; text-align: center; padding: 60px 20px; color: #555; }
  #empty .empty-icon { font-size: 28px; margin-bottom: 10px; }
  #empty .empty-label { font-family: monospace; letter-spacing: 2px; font-size: 11px; }
  #empty .empty-hint { font-size: 12px; margin-top: 6px; }

  #station-list { display: flex; flex-direction: column; gap: 7px; padding-bottom: 16px; }

  .station-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    -webkit-user-select: none; user-select: none;
  }
  .station-card:active { background: rgba(255,255,255,0.06); }
  .station-card.active {
    background: linear-gradient(120deg, rgba(201,162,39,0.09), rgba(201,162,39,0.02));
    border-color: var(--amber-border);
  }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-left { flex: 1; min-width: 0; }
  .card-name-row { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; flex-wrap: wrap; }
  .on-air-badge {
    background: rgba(201,162,39,0.18); border: 1px solid rgba(201,162,39,0.42);
    border-radius: 3px; padding: 1px 5px;
    font-family: monospace; font-size: 9px; letter-spacing: 1px;
    color: var(--amber); font-weight: 700; flex-shrink: 0;
  }
  .vu-meter { display: inline-flex; gap: 2px; align-items: flex-end; height: 12px; flex-shrink: 0; }
  .vu-bar {
    width: 2px; background: var(--amber); border-radius: 1px;
    animation: vubar 0.4s ease-in-out infinite alternate;
  }
  @keyframes vubar { from { transform: scaleY(0.3); } to { transform: scaleY(1.4); } }
  .card-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .station-card.active .card-name { color: var(--amber); }
  .card-meta { font-size: 12px; color: var(--text-dim); }
  .card-genre { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .card-tag {
    font-size: 10px; color: var(--text-faint);
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 3px; padding: 1px 5px;
  }
  .fav-btn {
    background: none; border: none; cursor: pointer; font-size: 18px;
    padding: 0 0 0 12px; flex-shrink: 0; color: var(--text-faint);
    transition: color 0.2s; line-height: 1;
  }
  .fav-btn.saved { color: var(--amber); }

  /* ── Now Playing ── */
  #now-playing {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.98); backdrop-filter: blur(8px);
    border-top: 3px solid #3a2210;
    padding: 10px calc(16px + env(safe-area-inset-right, 0px)) calc(12px + var(--safe-bottom)) calc(16px + env(safe-area-inset-left, 0px));
    z-index: 100;
  }
  #tuning-bar {
    position: relative; height: 18px; margin-bottom: 8px; overflow: hidden; display: none;
  }
  #tuning-track {
    position: absolute; top: 50%; left: 0; right: 0; height: 1px;
    background: repeating-linear-gradient(90deg, rgba(201,162,39,0.22) 0, rgba(201,162,39,0.22) 3px, transparent 3px, transparent 10px);
    transform: translateY(-50%);
  }
  #tuning-needle {
    position: absolute; top: 5%; bottom: 5%; width: 2px;
    background: linear-gradient(180deg, transparent, var(--amber), transparent);
    box-shadow: 0 0 8px 2px rgba(201,162,39,0.6);
    border-radius: 2px; transition: left 0.06s linear;
  }
  #tuning-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: monospace; font-size: 9px; letter-spacing: 2px;
    color: rgba(201,162,39,0.55);
  }
  #np-row { display: flex; align-items: center; gap: 12px; }
  #play-stop-btn {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    background: var(--amber-dim); border: 1px solid var(--amber-border);
    color: var(--amber); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #np-info { flex: 1; min-width: 0; }
  #np-name {
    color: var(--amber); font-weight: 600; font-size: 14px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
  }
  #np-status { color: #888; font-family: monospace; font-size: 11px; margin-top: 2px; }
  #np-meta {
    display: none; font-size: 11px; color: var(--text-dim); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-style: italic;
  }
  #np-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#np-link { color: #777; font-family: monospace; font-size: 10px; text-decoration: none; }
  #np-link:hover { color: var(--amber); }

  /* ── Presets grid ── */
  #presets-grid { display: none; }
  .presets-inner {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; padding-bottom: 16px;
  }
  .preset-tile {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 10px 12px; cursor: pointer;
    text-align: center; transition: border-color 0.2s, background 0.2s;
    -webkit-user-select: none; user-select: none;
  }
  .preset-tile:active { background: rgba(255,255,255,0.07); }
  .preset-tile.active {
    background: linear-gradient(135deg, rgba(201,162,39,0.12), rgba(201,162,39,0.04));
    border-color: var(--amber-border);
  }
  .preset-freq {
    font-family: monospace; font-size: 22px; font-weight: 700;
    color: var(--amber); line-height: 1; margin-bottom: 5px;
    letter-spacing: -0.5px;
  }
  .preset-tile.active .preset-freq { text-shadow: 0 0 8px rgba(201,162,39,0.4); }
  .preset-call {
    font-size: 12px; font-weight: 700; color: var(--text);
    letter-spacing: 1px; font-family: monospace;
  }
  .preset-loc {
    font-size: 10px; color: var(--text-dim); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Share button ── */
  #share-btn {
    margin-left: auto;
    background: transparent; border: 1px solid transparent;
    border-radius: 5px; padding: 5px 10px; cursor: pointer;
    font-family: monospace; font-size: 11px; letter-spacing: 1px;
    color: #555; text-transform: uppercase; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  #share-btn:hover { color: var(--amber); border-color: var(--amber-border); }
  #share-btn.copied { color: var(--amber); border-color: var(--amber-border); }

  /* ── Spacer under list for now-playing bar ── */
  #np-spacer { height: 0; transition: height 0.2s; }
  #np-spacer.visible { height: 80px; }
</style>
</head>
<body>

<div id="header">
  <div id="wordmark">
    <div id="wordmark-title-row">
      <svg id="dial" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="10.5" fill="#9c9a92"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(0,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(30,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(60,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(90,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(120,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(150,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(180,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(210,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(240,11,11)"/>
      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(270,11,11)"/>

      <line x1="11" y1="1" x2="11" y2="3.5" stroke="#4a4a4a" stroke-width="1.2" transform="rotate(330,11,11)"/>
      <circle cx="11" cy="11" r="8" fill="#252525" stroke="#3a3a3a" stroke-width="0.5"/>
      <line x1="11" y1="4.5" x2="11" y2="8" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
      <circle cx="11" cy="11" r="1.5" fill="#555"/>
    </svg>
      <span id="wordmark-title">LEFT OF THE DIAL</span>
    </div>
    <span id="wordmark-sub">COLLEGE · PUBLIC · COMMUNITY RADIO</span>
  </div>
  <div id="search-row">
    <input id="search-input" type="search" placeholder='Search — "WKCR", "Columbia", "Seattle", "jazz"…' autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div id="tabs">
    <button class="tab-btn active" data-tab="browse" onclick="switchTab('browse')">Browse</button>
    <button class="tab-btn" data-tab="favs" onclick="switchTab('favs')">★ Saved (<span id="fav-count">0</span>)</button>
    <button class="tab-btn" data-tab="presets" onclick="switchTab('presets')">Presets</button>
    <button id="share-btn" onclick="shareFavs()" title="Copy shareable link to saved stations"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/><polyline points="16,6 12,2 8,6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share</button>
  </div>
  <div id="filter-row" id="filter-row"></div>
</div>

<div id="content">
  <div id="status-msg"></div>
  <div id="presets-grid"><div class="presets-inner" id="presets-inner"></div></div>
  <div id="import-row">
    <input id="import-input" type="url" placeholder="Paste a share URL to import saved stations…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="import-btn" onclick="importFavs()">Import</button>
  </div>
  <div id="loading">
    <div class="load-bar" style="height:8px;animation-delay:0s"></div>
    <div class="load-bar" style="height:13px;animation-delay:0.1s"></div>
    <div class="load-bar" style="height:10px;animation-delay:0.2s"></div>
    <div class="load-bar" style="height:16px;animation-delay:0.3s"></div>
    <div class="load-bar" style="height:9px;animation-delay:0.4s"></div>
  </div>
  <div id="empty">
    <div class="empty-icon">📻</div>
    <div class="empty-label" id="empty-label">NO STATIONS FOUND</div>
    <div class="empty-hint" id="empty-hint">Try a different search term.</div>
  </div>
  <div id="station-list"></div>
  <div id="np-spacer"></div>
</div>

<div id="now-playing">
  <div id="tuning-bar">
    <div id="tuning-track"></div>
    <div id="tuning-needle"></div>
    <div id="tuning-label">TUNING…</div>
  </div>
  <div id="np-row">
    <button id="play-stop-btn" onclick="togglePlay()"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg></button>
    <div id="np-info">
      <div id="np-name">—</div>
      <div id="np-status">—</div>
      <div id="np-meta"></div>
    </div>
    <div id="np-right">
      <a id="np-link" href="#" target="_blank" rel="noreferrer"></a>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>

// Merge any station IDs from URL hash: #favs=wkcr,wfmu,kalx
(function() {
  try {
    const m = location.hash.match(/[#&]favs=([^&]+)/);
    if (m) {
      const ids = m[1].split(',').filter(id => DB.some(s => s.id === id));
      ids.forEach(id => { if (!state.favs.includes(id)) state.favs.push(id); });
      try { localStorage.setItem('lotd-favs', JSON.stringify(state.favs)); } catch(e) {}
      history.replaceState(null, '', location.pathname + location.search);
    }
  } catch(e) {}
})();

const audio = document.getElementById('audio');
let tuneTimer = null;
let tuningRaf = null;

// ─────────────────────────────────────────────────────────────
// Tuning needle animation
// ─────────────────────────────────────────────────────────────
let needleDir = 1, needlePos = 20;
function animateNeedle() {
  needlePos += needleDir * (1.5 + Math.random() * 2.5);
  if (needlePos > 80) needleDir = -1;
  if (needlePos < 15) needleDir = 1;
  const needle = document.getElementById('tuning-needle');
  if (needle) needle.style.left = needlePos + '%';
  if (state.tuning) tuningRaf = requestAnimationFrame(animateNeedle);
}

// ─────────────────────────────────────────────────────────────
// Build filter chips
// ─────────────────────────────────────────────────────────────
function buildFilters() {
  const row = document.getElementById('filter-row');
  row.innerHTML = '';
  FILTERS.forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (i === state.filterIdx ? ' active' : '');
    btn.textContent = f.label;
    btn.onclick = () => { state.filterIdx = i; state.searchMode = false; render(); };
    row.appendChild(btn);
  });
}


// ─────────────────────────────────────────────────────────────
// RCD's Presets — curated station tiles
// ─────────────────────────────────────────────────────────────
const PRESETS = ['wfmu','wkcr','kexp','wwoz','kalx','wrek','wxyc','wbez','wfuv','wuog','wbur','wcbn'];

function renderPresets() {
  const grid = document.getElementById('presets-inner');
  grid.innerHTML = '';
  PRESETS.forEach(id => {
    const s = DB.find(x => x.id === id);
    if (!s) return;
    const isActive = state.currentId === s.id;
    const tile = document.createElement('div');
    tile.className = 'preset-tile' + (isActive ? ' active' : '');
    // Extract numeric frequency for display
    const freq = s.freq.replace(' FM','').replace(' AM','').replace(' Web','—');
    tile.innerHTML = `
      <div class="preset-freq">${freq}</div>
      <div class="preset-call">${s.id.toUpperCase()}</div>
      <div class="preset-loc">${s.city}</div>
    `;
    tile.addEventListener('click', () => tune(s));
    grid.appendChild(tile);
  });
}

// ─────────────────────────────────────────────────────────────
// Render station list
// ─────────────────────────────────────────────────────────────
function getDisplayList() {
  let list = DB;
  if (state.tab === 'favs') {
    list = DB.filter(s => state.favs.includes(s.id));
  } else if (state.searchMode && state.searchQuery.trim()) {
    const q = state.searchQuery.trim().toLowerCase();
    list = DB.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.city.toLowerCase().includes(q) ||
      s.state.toLowerCase().includes(q) ||
      s.org.toLowerCase().includes(q) ||
      s.genre.toLowerCase().includes(q) ||
      s.tags.some(t => t.includes(q)) ||
      (state.metaCache[s.id] || '').toLowerCase().includes(q)
    );
  } else {
    list = DB.filter(FILTERS[state.filterIdx].fn);
    // Also apply search filter if typed but not submitted
    const q = state.searchQuery.trim().toLowerCase();
    if (q) list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.city.toLowerCase().includes(q) ||
      s.org.toLowerCase().includes(q) ||
      s.genre.toLowerCase().includes(q) ||
      (state.metaCache[s.id] || '').toLowerCase().includes(q)
    );
  }
  return list;
}

function render() {
  // tabs
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.tab);
  });
  document.getElementById('fav-count').textContent = state.favs.length;

  // import row (only in favs tab) + presets grid
  document.getElementById('import-row').style.display = state.tab === 'favs' ? 'flex' : 'none';
  const presetsGrid = document.getElementById('presets-grid');
  if (state.tab === 'presets') {
    presetsGrid.style.display = 'block';
    renderPresets();
  } else {
    presetsGrid.style.display = 'none';
  }

  // filter row (only in browse + not search mode)
  const filterRow = document.getElementById('filter-row');
  filterRow.style.display = (state.tab === 'browse' && !state.searchMode) ? 'flex' : 'none';
  buildFilters();

  if (state.tab === 'presets') { document.getElementById('station-list').innerHTML = ''; document.getElementById('empty').style.display = 'none'; updateNowPlaying(); return; }
  const list = getDisplayList();
  const listEl = document.getElementById('station-list');
  const emptyEl = document.getElementById('empty');
  const loadingEl = document.getElementById('loading');

  loadingEl.style.display = 'none';
  if (list.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    if (state.tab === 'favs') {
      document.getElementById('empty-label').textContent = 'NO SAVED STATIONS';
      document.getElementById('empty-hint').textContent = 'Star any station to save it here.';
    } else {
      document.getElementById('empty-label').textContent = 'NO STATIONS FOUND';
      document.getElementById('empty-hint').textContent = 'Try a different search term or filter.';
    }
    return;
  }
  emptyEl.style.display = 'none';

  listEl.innerHTML = '';
  list.forEach(s => {
    const isActive = state.currentId === s.id;
    const isFav = state.favs.includes(s.id);
    const card = document.createElement('div');
    card.className = 'station-card' + (isActive ? ' active' : '');
    card.innerHTML = `
      <div class="card-top">
        <div class="card-left">
          <div class="card-name-row">
            ${isActive ? '<span class="on-air-badge">ON AIR</span>' : ''}
            ${isActive && state.playing ? `<span class="vu-meter">${[5,9,6,11,7,8].map((h,i) => `<span class="vu-bar" style="height:${h}px;animation-delay:${i*0.07}s"></span>`).join('')}</span>` : ''}
            <span class="card-name">${s.name}</span>
          </div>
          <div class="card-meta">${s.org} · ${s.city}, ${s.state}</div>
          <div class="card-genre">${s.genre}</div>
        </div>
        <button class="fav-btn ${isFav ? 'saved' : ''}" data-id="${s.id}">${isFav ? '★' : '☆'}</button>
      </div>
    `;
    card.querySelector('.fav-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFav(s.id);
    });
    card.addEventListener('click', () => tune(s));
    listEl.appendChild(card);
  });

  updateNowPlaying();
}



// ─────────────────────────────────────────────────────────────
// MediaSession (lock screen / CarPlay)
// ─────────────────────────────────────────────────────────────
function setMediaSession(station, metaText) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: station.name,
    artist: metaText || station.genre,
    album: station.org + ' · ' + station.city + ', ' + station.state,
    artwork: [{ src: 'icon.jpg', sizes: '300x300', type: 'image/jpeg' }]
  });
  navigator.mediaSession.playbackState = 'playing';
  navigator.mediaSession.setActionHandler('play',  () => { if (!state.playing) togglePlay(); });
  navigator.mediaSession.setActionHandler('pause', () => { if (state.playing)  togglePlay(); });
  navigator.mediaSession.setActionHandler('stop',  () => {
    audio.pause(); state.playing = false; stopMeta(); clearMediaSession(); render();
  });
}

function clearMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = null;
  navigator.mediaSession.playbackState = 'none';
}

// ─────────────────────────────────────────────────────────────
// Now-playing metadata (fetched while streaming)
// ─────────────────────────────────────────────────────────────
const META_API = {
  kexp: async () => {
    const d = await fetch('https://api.kexp.org/v2/plays/?format=json&limit=1').then(r => r.json());
    const p = d.results?.[0];
    if (!p || p.play_type === 'airbreak') return null;
    return [p.artist, p.song].filter(Boolean).join(' — ');
  },
  kexp_la: async () => { // KCRW
    const d = await fetch('https://tracklist-api.kcrw.com/Simulcast').then(r => r.json());
    return [d.artist, d.title].filter(Boolean).join(' — ');
  },
};

async function icecastMeta(streamUrl) {
  const u = new URL(streamUrl);
  const d = await fetch(u.origin + '/status-json.xsl').then(r => r.json());
  let src = d?.icestats?.source;
  if (Array.isArray(src)) src = src[0];
  return src?.title?.trim() || null;
}

let metaTimer = null;

async function refreshMeta() {
  if (!state.playing || !state.currentId) return;
  const station = DB.find(s => s.id === state.currentId);
  if (!station) return;
  let text = null;
  try {
    const api = META_API[station.id];
    text = api ? await api() : await icecastMeta(station.url);
  } catch(e) {}
  if (text) {
    state.metaCache[station.id] = text;
    setMediaSession(station, text);
  }
  const el = document.getElementById('np-meta');
  if (!el) return;
  el.textContent = text || '';
  el.style.display = text ? 'block' : 'none';
}

function startMeta() {
  clearInterval(metaTimer);
  refreshMeta();
  metaTimer = setInterval(refreshMeta, 60000);
}

function stopMeta() {
  clearInterval(metaTimer);
  const el = document.getElementById('np-meta');
  if (el) { el.textContent = ''; el.style.display = 'none'; }
}

// ─────────────────────────────────────────────────────────────
// Tuning / playback
// ─────────────────────────────────────────────────────────────
function tune(station) {
  showStatus('');
  if (state.currentId === station.id && state.playing) {
    audio.pause();
    state.playing = false;
    stopMeta(); clearMediaSession();
    render();
    return;
  }
  state.currentId = station.id;
  state.tuning = true;
  state.playing = false;
  clearTimeout(tuneTimer);
  audio.pause();
  audio.src = station.url;
  audio.load();
  render();
  startTuningBar();
  audio.play()
    .then(() => {
      state.playing = true;
      state.tuning = false;
      stopTuningBar();
      setMediaSession(station, null);
      startMeta();
      render();
    })
    .catch((err) => {
      state.tuning = false;
      stopTuningBar();
      showStatus(`Couldn't connect to ${station.name}. The stream may be offline or require a different app. Try visiting ${station.site} directly.`, 'error');
      render();
    });
}

function togglePlay() {
  if (!state.currentId) return;
  const s = DB.find(x => x.id === state.currentId);
  if (!s) return;
  if (state.playing) {
    audio.pause();
    state.playing = false;
    stopMeta(); clearMediaSession();
    render();
  } else {
    tune(s);
  }
}

audio.addEventListener('ended', () => { state.playing = false; stopMeta(); clearMediaSession(); render(); });
audio.addEventListener('error', () => {
  if (!state.currentId) return;
  const s = DB.find(x => x.id === state.currentId);
  state.playing = false;
  state.tuning = false;
  stopTuningBar();
  stopMeta(); clearMediaSession();
  if (s) showStatus(`Stream error for ${s.name}. It may be offline — try visiting ${s.site} to confirm.`, 'error');
  render();
});

function startTuningBar() {
  const bar = document.getElementById('tuning-bar');
  bar.style.display = 'block';
  cancelAnimationFrame(tuningRaf);
  tuningRaf = requestAnimationFrame(animateNeedle);
}
function stopTuningBar() {
  const bar = document.getElementById('tuning-bar');
  bar.style.display = 'none';
  cancelAnimationFrame(tuningRaf);
}

// ─────────────────────────────────────────────────────────────
// Now Playing bar
// ─────────────────────────────────────────────────────────────
function updateNowPlaying() {
  const bar = document.getElementById('now-playing');
  const spacer = document.getElementById('np-spacer');
  if (!state.currentId) {
    bar.style.display = 'none';
    spacer.classList.remove('visible');
    return;
  }
  const s = DB.find(x => x.id === state.currentId);
  if (!s) return;
  bar.style.display = 'block';
  spacer.classList.add('visible');

  const btn = document.getElementById('play-stop-btn');
  btn.innerHTML = state.playing ? '<svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"currentColor\"><rect x=\"4\" y=\"4\" width=\"16\" height=\"16\" rx=\"1.5\"/></svg>' : '<svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"currentColor\"><polygon points=\"6,3 20,12 6,21\"/></svg>';

  const nameEl = document.getElementById('np-name');
  nameEl.innerHTML = '';
  if (state.playing) {
    const vu = document.createElement('span');
    vu.className = 'vu-meter';
    vu.innerHTML = [4,8,5,10,6].map((h,i) => `<span class="vu-bar" style="height:${h}px;animation-delay:${i*0.08}s"></span>`).join('');
    nameEl.appendChild(vu);
  }
  const nameText = document.createTextNode(s.name);
  nameEl.appendChild(nameText);

  document.getElementById('np-status').textContent =
    state.tuning ? 'Scanning…' : state.playing ? `● LIVE · ${s.city}, ${s.state}` : `Stopped · ${s.city}, ${s.state}`;

  const link = document.getElementById('np-link');
  link.textContent = s.site + ' ↗';
  link.href = 'https://' + s.site;
}

// ─────────────────────────────────────────────────────────────
// Favorites + Share + Import
// ─────────────────────────────────────────────────────────────
function importFavs() {
  const raw = document.getElementById('import-input').value.trim();
  if (!raw) return;
  // Accept: full URL with #favs=..., bare #favs=..., or plain comma list
  const m = raw.match(/#favs=([^&\s]+)/);
  const idsStr = m ? m[1] : raw;
  const valid = idsStr.split(',')
    .map(s => s.trim().toLowerCase())
    .filter(id => DB.some(s => s.id === id));
  if (!valid.length) {
    showStatus('No matching stations found in that URL.', 'error');
    return;
  }
  let added = 0;
  valid.forEach(id => { if (!state.favs.includes(id)) { state.favs.push(id); added++; } });
  try { localStorage.setItem('lotd-favs', JSON.stringify(state.favs)); } catch(e) {}
  document.getElementById('import-input').value = '';
  const skipped = valid.length - added;
  showStatus(
    `Added ${added} station${added !== 1 ? 's' : ''}${skipped ? ` · ${skipped} already saved` : ''}.`,
    'info'
  );
  render();
}

function shareFavs() {
  if (state.favs.length === 0) { showStatus('No saved stations to share.', 'info'); return; }
  const url = location.href.split('#')[0] + '#favs=' + state.favs.join(',');
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('share-btn');
    btn.innerHTML = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = '<svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3\"/><polyline points=\"16,6 12,2 8,6\"/><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"15\"/></svg> Share'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    prompt('Copy this link to share your saved stations:', url);
  });
}

function toggleFav(id) {
  if (state.favs.includes(id)) {
    state.favs = state.favs.filter(x => x !== id);
  } else {
    state.favs.push(id);
  }
  try { localStorage.setItem('lotd-favs', JSON.stringify(state.favs)); } catch(e) {}
  render();
}

// ─────────────────────────────────────────────────────────────
// Tabs / Search
// ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  state.searchMode = false;
  render();
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  state.searchQuery = q;
  state.searchMode = true;
  state.tab = 'browse';
  render();
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('search-input').addEventListener('input', e => {
  state.searchQuery = e.target.value;
  if (!e.target.value.trim()) { state.searchMode = false; }
  render();
});

// ─────────────────────────────────────────────────────────────
// Status messages
// ─────────────────────────────────────────────────────────────
function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type || '';
  el.style.display = msg ? 'block' : 'none';
}

// ─────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
